services:
  - type: web
    name: colombia-comparte-simulator-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: Colombia Comparte Simulator
      - key: ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://mi-frontend.vercel.app
